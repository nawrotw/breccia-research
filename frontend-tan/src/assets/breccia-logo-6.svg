<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="currentColor">
  <!-- Breccia variant 6: geological cross-section style with layered angular fragments -->
  <rect x="4" y="4" width="64" height="64" rx="8" fill="currentColor" opacity="0.06"/>
  <!-- Large angular clasts -->
  <polygon points="10,10 28,8 30,20 14,24" fill="currentColor" opacity="0.8"/>
  <polygon points="32,8 52,6 56,16 36,20" fill="currentColor" opacity="0.5"/>
  <polygon points="56,10 66,14 66,28 58,26" fill="currentColor" opacity="0.7"/>
  <!-- Medium fragments -->
  <polygon points="8,28 20,26 24,36 10,40" fill="currentColor" opacity="0.6"/>
  <polygon points="26,24 38,22 42,32 30,36" fill="currentColor" opacity="0.4"/>
  <polygon points="44,20 58,28 54,40 42,34" fill="currentColor" opacity="0.75"/>
  <!-- Small fragments -->
  <polygon points="12,44 24,40 28,50 16,54" fill="currentColor" opacity="0.55"/>
  <polygon points="30,38 44,36 48,46 34,50" fill="currentColor" opacity="0.65"/>
  <polygon points="50,42 64,38 66,52 54,50" fill="currentColor" opacity="0.45"/>
  <!-- Bottom layer -->
  <polygon points="8,56 22,54 26,64 10,66" fill="currentColor" opacity="0.7"/>
  <polygon points="28,52 44,50 48,62 32,64" fill="currentColor" opacity="0.35"/>
  <polygon points="50,52 64,54 64,64 52,66" fill="currentColor" opacity="0.6"/>
  <!-- Matrix veins -->
  <line x1="30" y1="20" x2="26" y2="24" stroke="currentColor" stroke-width="0.7" opacity="0.15"/>
  <line x1="42" y1="32" x2="44" y2="36" stroke="currentColor" stroke-width="0.7" opacity="0.15"/>
  <line x1="24" y1="40" x2="30" y2="38" stroke="currentColor" stroke-width="0.7" opacity="0.15"/>
  <line x1="48" y1="46" x2="50" y2="42" stroke="currentColor" stroke-width="0.7" opacity="0.15"/>
  <line x1="22" y1="54" x2="28" y2="52" stroke="currentColor" stroke-width="0.7" opacity="0.15"/>
</svg>
